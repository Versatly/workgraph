services:
  workgraph-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      WORKGRAPH_WORKSPACE: /data/workspace
      WORKGRAPH_HOST: 0.0.0.0
      WORKGRAPH_PORT: 8787
      WORKGRAPH_ACTOR: server
      WORKGRAPH_BEARER_TOKEN: dev-token
    volumes:
      - ./.docker/workspace:/data/workspace
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
